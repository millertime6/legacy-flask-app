<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Servicing Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='servicing.css') }}">
</head>
<body>
  <main class="container auth-wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="alerts">
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}

    <section class="panel auth-panel">
      <h2>Legacy Servicing Login</h2>
      <p class="muted">Sign in to access servicing workflows.</p>
      <form method="post" class="form-grid auth-form">
        <input type="hidden" name="next" value="{{ next_path }}">
        <label>
          Username
          <input type="text" name="username" required autofocus>
        </label>
        <label>
          Password
          <input type="password" name="password" required>
        </label>
        <div class="full">
          <button type="submit">Sign In</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
